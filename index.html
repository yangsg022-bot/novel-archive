<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>잼젠 포타 아카이브</title>
  <style>
    /* 원래 사이트의 깔끔하고 차분한 배경색(#f9f9fb)과 무드를 그대로 유지 */
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #f9f9fb;
      color: #333;
      margin: 0;
      padding: 40px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }

    /* 이모지를 빼고 깔끔하게 폰트로만 타이포그래피 처리한 헤더 */
    header {
      text-align: center;
      margin-bottom: 35px;
    }
    header h1 {
      font-size: 2.3rem;
      font-weight: 700;
      margin: 0 0 8px 0;
      color: #111;
      letter-spacing: -0.5px;
    }
    header div {
      font-size: 1rem;
      color: #666;
      font-weight: 500;
      letter-spacing: 1px;
    }

    /* 원래 가지고 계시던 깔끔한 검색바 스타일 */
    .search-container {
      width: 100%;
      max-width: 600px;
      margin-bottom: 25px;
    }
    .search-bar {
      width: 100%;
      padding: 14px 20px;
      border: 1px solid #e2e8f0;
      border-radius: 30px;
      font-size: 1rem;
      box-shadow: 0 2px 8px rgba(0,0,0,0.03);
      outline: none;
      box-sizing: border-box;
      background-color: #fff;
    }
    .search-bar:focus {
      border-color: #cbd5e1;
    }

    /* 사이트 무드에 튀지 않게 녹아드는 단정한 장르 버튼 디자인 */
    .genre-container {
      display: flex;
      gap: 10px;
      margin-bottom: 30px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .genre-btn {
      background-color: #fff;
      color: #555;
      border: 1px solid #e2e8f0;
      padding: 8px 18px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 0.95rem;
      font-weight: 500;
      transition: all 0.15s ease;
    }
    .genre-btn:hover {
      background-color: #f1f5f9;
      border-color: #cbd5e1;
    }
    /* 선택된 버튼은 깔끔하게 블랙/다크그레이 톤으로 강조 */
    .genre-btn.active {
      background-color: #1e293b;
      color: #fff;
      border-color: #1e293b;
    }

    /* 원래 사이트의 깔끔하고 정돈된 화이트 테이블 레이아웃 */
    .table-container {
      width: 100%;
      max-width: 850px;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.04);
      overflow: hidden;
      margin-bottom: 50px;
      border: 1px solid #edf2f7;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      text-align: left;
    }
    th, td {
      padding: 15px 20px;
      border-bottom: 1px solid #edf2f7;
    }
    th {
      background-color: #fafafa;
      font-weight: 600;
      color: #4a5568;
      font-size: 0.95rem;
    }
    td {
      font-size: 0.95rem;
      color: #333;
    }
    tr:last-child td {
      border-bottom: none;
    }
</body>
</html>
