<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🐰🐶 잼젠 포타 아카이브</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
background:#f8f9fb;
color:#333;
padding:20px;
max-width:900px;
margin:auto;
}

header{
text-align:center;
margin-bottom:25px;
}

h1{
font-size:2rem;
}

.subtitle{
color:#888;
margin-top:8px;
}

.stats{
margin-top:10px;
font-size:14px;
color:#666;
}

#search{
width:100%;
padding:14px;
border:none;
border-radius:14px;
margin:20px 0;
font-size:15px;
box-shadow:0 2px 10px rgba(0,0,0,.05);
}

.genre{
display:flex;
flex-wrap:wrap;
gap:8px;
margin-bottom:20px;
}

.genre button{
border:none;
padding:8px 14px;
border-radius:999px;
background:white;
cursor:pointer;
box-shadow:0 2px 8px rgba(0,0,0,.05);
}

.genre button:hover{
transform:translateY(-2px);
}

.resultCount{
margin-bottom:15px;
color:#777;
font-size:14px;
}

.card{
background:white;
padding:18px;
border-radius:18px;
margin-bottom:12px;
box-shadow:0 4px 15px rgba(0,0,0,.05);
position:relative;
}

.card a{
text-decoration:none;
color:inherit;
display:block;
}

.title{
font-size:17px;
font-weight:700;
margin-bottom:8px;
padding-right:40px;
}

.meta{
font-size:13px;
color:#777;
line-height:1.8;
}

.badge{
display:inline-block;
padding:4px 8px;
border-radius:999px;
font-size:12px;
margin-right:4px;
}

.adult{
background:#ffe1e1;
}

.complete{
background:#e3f8e3;
}

.favorite{
position:absolute;
right:16px;
top:16px;
cursor:pointer;
font-size:22px;
user-select:none;
}

.empty{
text-align:center;
padding:40px;
color:#999;
}

footer{
margin-top:30px;
text-align:center;
font-size:12px;
color:#999;
}

</style>
</head>

<body>

<header>
<h1>🐰🐶 잼젠 포타 아카이브</h1>
<div class="subtitle">
JamJen Postype Archive
</div>

<div class="stats" id="totalCount">
총 0편 수록
</div>

</header>

<input
type="text"
id="search"
placeholder="🔍 작품명 검색">

<div
class="genre"
id="genreButtons">
</div>

<div
class="resultCount"
id="resultCount">
</div>

<div id="list"></div>

<footer>
☁️ Made for JamJen Archive
</footer>

<script>

let novels=[];
let currentGenre="전체";

let favorites=
JSON.parse(
localStorage.getItem("favorites")
|| "[]"
);

fetch("novels.json")
.then(res=>res.json())
.then(data=>{

novels=data;

document.getElementById(
"totalCount"
).textContent=
`총 ${novels.length}편 수록`;

createGenreButtons();

render();

});

function createGenreButtons(){

const container=
document.getElementById(
"genreButtons"
);

container.innerHTML="";

container.innerHTML+=`
<button onclick="filterGenre('전체')">
전체 (${novels.length})
</button>
`;

container.innerHTML+=`
<button onclick="filterGenre('즐겨찾기')">
⭐ 즐겨찾기 (${favorites.length})
</button>
`;

const counts={};

novels.forEach(n=>{

n.genre.forEach(g=>{

if(g==="성인") return;

counts[g]=(counts[g]||0)+1;

});

});

Object.keys(counts)
.sort()
.forEach(g=>{

container.innerHTML+=`
<button onclick="filterGenre('${g}')">
${g} (${counts[g]})
</button>
`;

});

}

function render(){

const keyword=
document
.getElementById("search")
.value
.toLowerCase();

let filtered=
novels.filter(n=>{

const searchMatch=
n.title
.toLowerCase()
.includes(keyword);

if(currentGenre==="전체")
return searchMatch;

if(currentGenre==="즐겨찾기")
return favorites.includes(n.title)
&& searchMatch;

return n.genre.includes(currentGenre)
&& searchMatch;

});

document.getElementById(
"resultCount"
).textContent=
`검색 결과 ${filtered.length}편`;

const list=
document.getElementById("list");

if(filtered.length===0){

list.innerHTML=`
<div class="empty">
검색 결과가 없습니다 🥲
</div>
`;

return;
}

list.innerHTML="";

filtered.forEach(n=>{

const isFavorite=
favorites.includes(n.title);

const genres=
n.genre
.filter(g=>g!=="성인")
.join(" · ");

const adult=
n.genre.includes("성인")
? `<span class="badge adult">🔞 19금</span>`
: "";

list.innerHTML+=`

<div class="card">

<div
class="favorite"
onclick="toggleFavorite('${n.title}')">
${isFavorite ? "★" : "☆"}
</div>

<a href="${n.link}"
target="_blank">

<div class="title">
${n.title}
</div>

<div class="meta">

✍️ ${n.author}

<br>

📚 ${genres}

<br>

${adult}

<span class="badge complete">
🟢 ${n.status}
</span>

</div>

</a>

</div>

`;

});

}

function filterGenre(g){

currentGenre=g;

render();

}

function toggleFavorite(title){

if(favorites.includes(title)){

favorites=
favorites.filter(
f=>f!==title
);

}else{

favorites.push(title);

}

localStorage.setItem(
"favorites",
JSON.stringify(favorites)
);

createGenreButtons();
render();

}

document
.getElementById("search")
.addEventListener(
"input",
render
);

</script>

</body>
</html>
